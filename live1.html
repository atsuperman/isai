<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Isai - Tamil Songs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      padding: 20px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 2rem;
      color: #e94560;
    }
    .stats {
      text-align: center;
      margin-bottom: 20px;
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
    }
    .song-list { display: flex; flex-direction: column; gap: 15px; }
    .song-card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .song-card:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(233,69,96,0.3);
    }
    .song-card.selected {
      background: rgba(233,69,96,0.3);
      border-color: #e94560;
    }
    .song-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .song-title { font-size: 1.1rem; font-weight: 600; }
    .song-duration-display {
      font-size: 0.9rem;
      color: #e94560;
      font-weight: 500;
      background: rgba(233,69,96,0.2);
      padding: 4px 12px;
      border-radius: 20px;
      display: none;
    }
    .song-card.selected .song-duration-display { display: inline-block; }
    .song-details {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.7);
      margin-top: 10px;
      line-height: 1.6;
    }
    .duration-info {
      margin-top: 15px;
      padding: 15px;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      display: none;
    }
    .song-card.selected .duration-info { display: block; }
    .duration-copy {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1a1a2e;
      padding: 12px 15px;
      border-radius: 8px;
      border: 1px solid #e94560;
    }
    .duration-text {
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      color: #00ff88;
      flex: 1;
    }
    .copy-btn {
      background: #e94560;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }
    .copy-btn:hover { background: #ff6b6b; }
    .copy-btn.copied { background: #00ff88; color: #1a1a2e; }
    @media (max-width: 600px) {
      .song-header { flex-direction: column; align-items: flex-start; }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎵 Isai Collection</h1>
    <div class="stats" id="stats"></div>
    <div class="song-list" id="songList"></div>
  </div>

  <script type="module">
    import { songs } from './isai.js';

    const songList = document.getElementById('songList');
    const stats = document.getElementById('stats');
    const durationCache = new Map();

    function formatDuration(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `$${mins}:$${secs.toString().padStart(2, '0')}`;
    }

    async function getAudioDuration(url) {
      if (durationCache.has(url)) return durationCache.get(url);
      return new Promise((resolve) => {
        const audio = new Audio();
        audio.onloadedmetadata = () => {
          const duration = Math.round(audio.duration);
          durationCache.set(url, duration);
          resolve(duration);
        };
        audio.onerror = () => {
          const fallback = 240;
          durationCache.set(url, fallback);
          resolve(fallback);
        };
        audio.src = url;
      });
    }

    async function copyToClipboard(text, btn) {
      try {
        await navigator.clipboard.writeText(text);
      } catch (err) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
      }
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 2000);
    }

    function createSongCard(song, index) {
      const card = document.createElement('div');
      card.className = 'song-card';
      card.dataset.index = index;

      card.innerHTML = `
        <div class="song-header">
          <span class="song-title">${index + 1}. $${song.file.replace(/\.(m4a|mp3)$$/, '')}</span>
          <span class="song-duration-display">⏱️ Loading...</span>
        </div>
        <div class="song-details">${song.details}</div>
        <div class="duration-info">
          <div class="duration-copy">
            <span class="duration-text" id="duration-${index}">duration: --</span>
            <button class="copy-btn" onclick="window.copyDuration(${index}, this)">Copy</button>
          </div>
        </div>
      `;

      card.addEventListener('click', async () => {
        document.querySelectorAll('.song-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');

        const durationDisplay = card.querySelector(`#duration-${index}`);
        const durationBadge = card.querySelector('.song-duration-display');
        durationBadge.textContent = '⏱️ Loading...';

        try {
          const duration = await getAudioDuration(song.url);
          const formatted = formatDuration(duration);
          durationDisplay.textContent = `duration: ${duration}`;
          durationBadge.textContent = `⏱️ ${formatted}`;
        } catch (error) {
          durationDisplay.textContent = 'duration: unavailable';
          durationBadge.textContent = '⏱️ --:--';
        }
      });

      return card;
    }

    window.copyDuration = function(index, btn) {
      const durationText = document.getElementById(`duration-${index}`).textContent;
      copyToClipboard(durationText, btn);
    };

    async function init() {
      stats.textContent = `Total Songs: ${songs.length}`;
      songList.innerHTML = '';
      songs.forEach((song, index) => {
        songList.appendChild(createSongCard(song, index));
      });
    }

    init();
  </script>
</body>
</html>
