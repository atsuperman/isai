<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Isai - Duration Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      padding: 20px;
    }
    .container { max-width: 1000px; margin: 0 auto; }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 2rem;
      color: #e94560;
    }
    .range-inputs {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .input-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .input-group label {
      font-size: 1rem;
      color: rgba(255,255,255,0.8);
    }
    .input-group input {
      width: 100px;
      padding: 12px 15px;
      border: 2px solid #e94560;
      border-radius: 8px;
      background: #0d0d1a;
      color: #fff;
      font-size: 1rem;
      text-align: center;
    }
    .input-group input:focus {
      outline: none;
      border-color: #00ff88;
    }
    .controls {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .btn {
      background: #e94560;
      color: white;
      border: none;
      padding: 15px 40px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .btn:hover { background: #ff6b6b; transform: scale(1.05); }
    .btn:disabled { background: #666; cursor: not-allowed; transform: none; }
    .btn.copy { background: #00ff88; color: #1a1a2e; }
    .progress-container {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 30px;
      display: none;
    }
    .progress-bar {
      height: 20px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 15px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #e94560, #00ff88);
      width: 0%;
      transition: width 0.3s ease;
    }
    .progress-text {
      text-align: center;
      font-size: 1rem;
      color: rgba(255,255,255,0.8);
    }
    .output-section {
      display: none;
    }
    .output-section.active { display: block; }
    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .output-title { font-size: 1.2rem; color: #00ff88; }
    .output-stats { color: rgba(255,255,255,0.6); font-size: 0.9rem; }
    .code-wrapper {
      position: relative;
      background: #0d0d1a;
      border: 2px solid #e94560;
      border-radius: 12px;
      padding: 20px;
      overflow-x: auto;
      max-height: 60vh;
      overflow-y: auto;
    }
    .code-text {
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      line-height: 1.6;
      color: #00ff88;
      white-space: pre-wrap;
      word-break: break-all;
      margin-right: 100px;
    }
    .copy-btn-fixed {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #00ff88;
      color: #1a1a2e;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s ease;
      z-index: 10;
    }
    .copy-btn-fixed:hover {
      background: #00cc6a;
      transform: scale(1.05);
    }
    .copy-btn-fixed.copied {
      background: #e94560;
      color: white;
    }
    .log-container {
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      max-height: 200px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
    }
    .log-entry {
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .log-entry:last-child { border-bottom: none; }
    .log-success { color: #00ff88; }
    .log-loading { color: #e94560; }
    .error-message {
      color: #ff6b6b;
      text-align: center;
      margin-bottom: 15px;
      font-size: 0.95rem;
      display: none;
    }
    @media (max-width: 600px) {
      h1 { font-size: 1.5rem; }
      .btn { padding: 12px 30px; font-size: 1rem; }
      .input-group input { width: 80px; }
      .code-text { margin-right: 0; }
      .copy-btn-fixed {
        position: static;
        display: block;
        width: 100%;
        margin-bottom: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎵 Isai Duration Generator</h1>
    
    <div class="range-inputs">
      <div class="input-group">
        <label for="fromInput">From:</label>
        <input type="number" id="fromInput" min="1" value="1">
      </div>
      <span style="font-size: 1.5rem; color: #e94560;">→</span>
      <div class="input-group">
        <label for="toInput">To:</label>
        <input type="number" id="toInput" min="1" value="10">
      </div>
      <span style="color: rgba(255,255,255,0.5); font-size: 0.9rem;">(Total songs: <span id="totalSongs">0</span>)</span>
    </div>

    <div class="error-message" id="errorMessage"></div>

    <div class="controls">
      <button class="btn" id="loadBtn">▶ Load Selected Range</button>
    </div>

    <div class="progress-container" id="progressContainer">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">Loading... 0 / 0</div>
    </div>

    <div class="log-container" id="logContainer"></div>

    <div class="output-section" id="outputSection">
      <div class="output-header">
        <span class="output-title">✅ Generated Code</span>
        <span class="output-stats" id="outputStats"></span>
      </div>
      <div class="code-wrapper">
        <button class="copy-btn-fixed" id="copyBtn">📋 Copy Code</button>
        <div class="code-text" id="codeText"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { songs } from './isai.js';

    const fromInput = document.getElementById('fromInput');
    const toInput = document.getElementById('toInput');
    const totalSongsSpan = document.getElementById('totalSongs');
    const loadBtn = document.getElementById('loadBtn');
    const copyBtn = document.getElementById('copyBtn');
    const progressContainer = document.getElementById('progressContainer');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const logContainer = document.getElementById('logContainer');
    const outputSection = document.getElementById('outputSection');
    const codeText = document.getElementById('codeText');
    const outputStats = document.getElementById('outputStats');
    const errorMessage = document.getElementById('errorMessage');

    const durationCache = new Map();
    let generatedCode = [];

    totalSongsSpan.textContent = songs.length;

    function log(message, type = 'loading') {
      const entry = document.createElement('div');
      entry.className = `log-entry log-${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logContainer.appendChild(entry);
      logContainer.scrollTop = logContainer.scrollHeight;
    }

    function formatDuration(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `$${mins}:$${secs.toString().padStart(2, '0')}`;
    }

    async function getAudioDuration(url) {
      if (durationCache.has(url)) return durationCache.get(url);
      return new Promise((resolve) => {
        const audio = new Audio();
        audio.onloadedmetadata = () => {
          const duration = Math.round(audio.duration);
          durationCache.set(url, duration);
          resolve(duration);
        };
        audio.onerror = () => {
          const fallback = 240;
          durationCache.set(url, fallback);
          resolve(fallback);
        };
        audio.src = url;
      });
    }

    function escapeString(str) {
      // Only escape backslashes and quotes, nothing else
      return str.replace(/\\/g, '\\\\').replace(/"/g, '\\"');
    }

    function generateCodeLine(song, duration) {
      // Clean the file and details without adding extra characters
      const file = escapeString(song.file);
      const details = escapeString(song.details);
      // Simple format - no template literals, just string concatenation
      return '{ file: "' + file + '", details: "' + details + '", duration: ' + duration + ' },';
    }

    function validateRange() {
      const from = parseInt(fromInput.value);
      const to = parseInt(toInput.value);
      const total = songs.length;

      if (isNaN(from) || isNaN(to)) {
        return { valid: false, message: 'Please enter valid numbers' };
      }
      if (from < 1 || to < 1) {
        return { valid: false, message: 'Values must be at least 1' };
      }
      if (from > total || to > total) {
        return { valid: false, message: 'Values cannot exceed total songs (' + total + ')' };
      }
      if (from > to) {
        return { valid: false, message: '"From" cannot be greater than "To"' };
      }
      return { valid: true, from: from - 1, to: to };
    }

    async function loadSelectedRange() {
      const validation = validateRange();
      
      if (!validation.valid) {
        errorMessage.textContent = '❌ ' + validation.message;
        errorMessage.style.display = 'block';
        return;
      }

      errorMessage.style.display = 'none';
      loadBtn.disabled = true;
      progressContainer.style.display = 'block';
      outputSection.classList.remove('active');
      logContainer.innerHTML = '';
      generatedCode = [];

      const from = validation.from;
      const to = validation.to;
      const total = to - from;
      let completed = 0;

      log('Starting to load songs ' + (from + 1) + ' to ' + to + ' (' + total + ' songs)...', 'loading');

      for (let i = from; i < to; i++) {
        const song = songs[i];
        const songNumber = i + 1;
        const fileName = song.file;
        
        log('Loading ' + (completed + 1) + '/' + total + ': Song #' + songNumber + ' - ' + fileName + '...', 'loading');
        
        try {
          const duration = await getAudioDuration(song.url);
          const formatted = formatDuration(duration);
          const codeLine = generateCodeLine(song, duration);
          
          generatedCode.push(codeLine);
          completed++;
          
          const progress = (completed / total) * 100;
          progressFill.style.width = progress + '%';
          progressText.textContent = 'Loading... ' + completed + ' / ' + total;
          
          log('✓ Song #' + songNumber + ' - Duration: ' + duration + 's (' + formatted + ')', 'success');
        } catch (error) {
          log('✗ Song #' + songNumber + ' - Error: ' + error.message, 'loading');
          completed++;
          const progress = (completed / total) * 100;
          progressFill.style.width = progress + '%';
          progressText.textContent = 'Loading... ' + completed + ' / ' + total;
        }

        await new Promise(resolve => setTimeout(resolve, 100));
      }

      log('✅ All selected songs loaded successfully!', 'success');
      loadBtn.disabled = false;
      progressText.textContent = 'Completed! ' + completed + ' / ' + total;

      const finalCode = generatedCode.join('\n');
      codeText.textContent = finalCode;
      outputStats.textContent = 'Range: ' + (from + 1) + ' - ' + to + ' | Total: ' + total + ' songs';
      outputSection.classList.add('active');
    }

    async function copyCode() {
      try {
        await navigator.clipboard.writeText(codeText.textContent);
        copyBtn.textContent = '✓ Copied!';
        copyBtn.classList.add('copied');
        log('✅ Code copied to clipboard!', 'success');
        setTimeout(() => {
          copyBtn.textContent = '📋 Copy Code';
          copyBtn.classList.remove('copied');
        }, 2000);
      } catch (err) {
        const textarea = document.createElement('textarea');
        textarea.value = codeText.textContent;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        copyBtn.textContent = '✓ Copied!';
        copyBtn.classList.add('copied');
        log('✅ Code copied to clipboard!', 'success');
        setTimeout(() => {
          copyBtn.textContent = '📋 Copy Code';
          copyBtn.classList.remove('copied');
        }, 2000);
      }
    }

    loadBtn.addEventListener('click', loadSelectedRange);
    copyBtn.addEventListener('click', copyCode);
  </script>
</body>
</html>
