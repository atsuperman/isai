<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>SUPER இசை</title>
    <link rel="icon" href="https://raw.githubusercontent.com/atsuperman/isai/refs/heads/main/Sisai.png" type="png/x-icon">
    <style>
        /* புதிய டார்க் தீம் - பிரதான மாற்றங்கள் */
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            overflow-x: hidden;
            overflow-y: auto;
            padding: 20px 0;
            color: #e0e0e0;
        }

        /* புதிய வரி பக்கங்களுக்கு */
        .vertical-line {
            position: absolute;
            left: 2%;
            top: 0;
            height: 100%;
            width: 3px;
            background: linear-gradient(to bottom, #00ff88, #0088ff, #ff00ff);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        /* புதிய லோகோ டிசைன் */
        .logo-container {
            margin: 20px 0 30px;
            text-align: center;
            position: relative;
        }

        .logo {
            font-family: 'Arial Black', 'Arial Bold', Gadget, sans-serif;
            font-size: clamp(2.5rem, 10vw, 5rem);
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(90deg, #00ff88, #0088ff, #ff00ff, #ff8800);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -2px;
            margin: 0;
            position: relative;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            animation: logoGlow 3s infinite alternate;
        }

        @keyframes logoGlow {
            0% { text-shadow: 0 0 20px rgba(0, 255, 136, 0.5); }
            50% { text-shadow: 0 0 30px rgba(0, 136, 255, 0.7); }
            100% { text-shadow: 0 0 25px rgba(255, 0, 255, 0.6); }
        }

        .logo::after {
            content: 'இசை';
            font-family: 'Nirmala UI', 'Arial Unicode MS', sans-serif;
            font-size: 0.35em;
            background: linear-gradient(45deg, #aaa, #fff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            position: absolute;
            right: -0.2em;
            bottom: -0.6em;
            text-transform: none;
            letter-spacing: 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* முக்கிய உள்ளடக்கம் */
        .content-wrapper {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 20px 0;
        }

        /* புதிய கன்டெய்னர் டிசைன்கள் */
        .a-container, .b-container, .c-container {
            margin-left: 6%;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            background: rgba(20, 20, 30, 0.7);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),
                        0 0 0 1px rgba(255, 255, 255, 0.05),
                        inset 0 0 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .a-container::before, .b-container::before, .c-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transition: left 0.7s ease;
        }

        .a-container:hover::before, .b-container:hover::before, .c-container:hover::before {
            left: 100%;
        }

        .b-container {
            background: rgba(25, 25, 40, 0.8);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            border: 1px solid rgba(0, 255, 136, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4),
                        0 0 0 1px rgba(0, 255, 136, 0.1),
                        inset 0 0 20px rgba(0, 0, 0, 0.3);
        }

        .c-container {
            border: 1px solid rgba(0, 136, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4),
                        0 0 0 1px rgba(0, 136, 255, 0.1),
                        inset 0 0 20px rgba(0, 0, 0, 0.3);
        }

        /* புதிய ஐகான் வரிசை */
        .icon-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            margin-top: 10px;
            position: relative;
        }

        .icon {
            cursor: pointer;
            transition: all 0.3s ease;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(30, 30, 45, 0.8);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .icon::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(255,255,255,0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .icon:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4),
                        0 0 15px rgba(0, 255, 136, 0.3);
        }

        .icon:hover::before {
            opacity: 1;
        }

        .icon svg {
            width: 24px;
            height: 24px;
            fill: #00ff88;
            filter: drop-shadow(0 0 3px rgba(0, 255, 136, 0.5));
        }

        /* நவீன ப்ளே/பாஸ் ஐகான் */
        #play-pause {
            background: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
        }

        #play-pause svg {
            fill: #000;
        }

        #next {
            background: linear-gradient(135deg, #0088ff 0%, #0066cc 100%);
        }

        #next svg {
            fill: #fff;
        }

        #search {
            background: linear-gradient(135deg, #ff00ff 0%, #cc00cc 100%);
        }

        #search svg {
            fill: #fff;
        }

        #list {
            background: linear-gradient(135deg, #ff8800 0%, #cc6600 100%);
        }

        #list svg {
            fill: #fff;
        }

        /* புதிய தேடல் பெட்டி */
        #searchBoxContainer {
            display: none;
            width: 100%;
            margin-top: 15px;
            animation: fadeIn 0.5s ease;
        }

        #searchBox {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid rgba(0, 255, 136, 0.3);
            border-radius: 30px;
            font-size: 16px;
            background: rgba(10, 10, 20, 0.8);
            color: #fff;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        #searchBox:focus {
            outline: none;
            border-color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5),
                        0 5px 15px rgba(0, 0, 0, 0.3);
        }

        /* தற்போதைய பாடல் விவரங்கள் */
        #currentSong {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #currentSongName {
            font-size: 20px;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
            margin-bottom: 5px;
        }

        #songDetails {
            font-size: 14px;
            color: #b0b0ff;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        #songDetails:hover {
            background: rgba(0, 255, 136, 0.1);
        }

        #songDetails.expanded {
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        /* பாடல் பட்டியல் */
        #songQueue {
            margin-top: 20px;
        }

        #songQueue h4 {
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            color: #00ccff;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(0, 204, 255, 0.3);
            position: relative;
            padding-bottom: 10px;
        }

        #songQueue h4::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #00ccff, transparent);
        }

        #songList {
            max-height: 300px;
            overflow-y: auto;
            margin: 10px 0;
            border-radius: 10px;
            background: rgba(15, 15, 25, 0.7);
            padding: 15px;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.3);
        }

        /* புதிய பாடல் உருப்படி டிசைன் */
        .song-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            margin-bottom: 10px;
            background: rgba(30, 30, 45, 0.8);
            border-radius: 10px;
            border-left: 4px solid #00ff88;
            transition: all 0.3s ease;
            animation: slideIn 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .song-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 136, 0.1), transparent);
            transition: left 0.7s ease;
        }

        .song-item:hover::before {
            left: 100%;
        }

        .song-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3),
                        0 0 10px rgba(0, 255, 136, 0.2);
            background: rgba(40, 40, 60, 0.9);
        }

        .song-text {
            color: #fff;
            font-size: 15px;
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 15px;
        }

        .small-play-btn {
            cursor: pointer;
            margin-right: 15px;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(0, 255, 136, 0.1);
            transition: all 0.3s ease;
        }

        .small-play-btn:hover {
            background: rgba(0, 255, 136, 0.3);
            transform: scale(1.1);
        }

        .small-play-btn svg {
            width: 16px;
            height: 16px;
            fill: #00ff88;
        }

        .remove-button {
            background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 5px 12px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 3px 8px rgba(255, 0, 0, 0.2);
        }

        .remove-button:hover {
            background: linear-gradient(135deg, #ff6666 0%, #ff0000 100%);
            transform: scale(1.05);
            box-shadow: 0 5px 12px rgba(255, 0, 0, 0.3);
        }

        /* புதிய முன்னேற்ற பட்டை */
        .progress-container {
            position: relative;
            width: 100%;
            height: 25px;
            margin-top: 15px;
            display: none;
        }

        .progress-background {
            position: absolute;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            top: 50%;
            transform: translateY(-50%);
            border-radius: 3px;
        }

        .progress-line {
            position: absolute;
            height: 6px;
            background: linear-gradient(90deg, #00ff88, #0088ff);
            width: 0%;
            border-radius: 3px;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            transition: width 0.1s linear;
        }

        .progress-handle {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            left: 0;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.8);
            cursor: pointer;
            z-index: 10;
        }

        /* கால அளவு காட்சி */
        .duration-display {
            margin-left: 10px;
            font-size: 14px;
            color: #00ccff;
            font-family: 'Roboto Mono', monospace;
            padding: 5px 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
        }

        /* தேடல் முடிவுகள் */
        .search-result-item {
            position: relative;
            width: 100%;
            height: 70px;
            overflow: hidden;
            cursor: pointer;
            margin-bottom: 10px;
            border-radius: 10px;
            background: rgba(30, 30, 45, 0.8);
            transition: all 0.3s ease;
        }

        .search-result-item:hover {
            background: rgba(40, 40, 60, 0.9);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .search-result-item .front,
        .search-result-item .back {
            position: absolute;
            width: 100%;
            height: 100%;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 10px 15px;
            border-radius: 10px;
        }

        .search-result-item .front {
            background: rgba(30, 30, 45, 0.9);
            color: #fff;
            transform: translateY(0);
            opacity: 1;
        }

        .search-result-item .back {
            background: linear-gradient(135deg, #00cc66, #00ff88);
            color: #000;
            font-weight: bold;
            transform: translateY(100%);
            opacity: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-result-item.added .front {
            transform: translateY(-100%);
            opacity: 0;
        }

        .search-result-item.added .back {
            transform: translateY(0);
            opacity: 1;
        }

        .song-title {
            font-weight: bold;
            font-size: 16px;
            color: #00ff88;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-details {
            font-size: 13px;
            color: #b0b0ff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* லிங்க் கொண்டெய்னர் */
        .link-container {
            position: relative;
            text-align: center;
            padding: 20px;
            margin-top: 20px;
        }

        .link {
            font-size: 1.2em;
            font-weight: bold;
            color: #fff;
            text-decoration: none;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
            padding: 10px 20px;
            border-radius: 30px;
            background: rgba(0, 136, 255, 0.2);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            display: inline-block;
        }

        .link:hover {
            background: rgba(0, 136, 255, 0.4);
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 136, 255, 0.4);
        }

        .note {
            position: absolute;
            font-size: 1.8em;
            color: #00ff88;
            opacity: 0;
            animation: floatUp 8s ease-out forwards;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.7);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100vh) scale(0); opacity: 0; }
        }

        /* புதிய வேர்சன் கொண்டெய்னர் */
        .version-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 500px;
            margin: 15px 0;
            gap: 15px;
            padding: 12px 20px;
            border-radius: 12px;
            background: rgba(20, 20, 35, 0.7);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            margin-left: 6%;
        }

        .home-link {
            font: 600 14px 'Poppins', sans-serif;
            color: #00ccff;
            text-decoration: none;
            text-transform: uppercase;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.3s ease;
            background: rgba(0, 204, 255, 0.1);
        }

        .home-link:hover {
            color: #fff;
            background: rgba(0, 204, 255, 0.3);
            text-shadow: 0 0 10px rgba(0, 204, 255, 0.7);
            transform: translateY(-2px);
        }

        .separator {
            color: rgba(255, 255, 255, 0.3);
            font-weight: bold;
        }

        .update-glitch {
            cursor: pointer;
            font: 600 14px 'Poppins', sans-serif;
            color: #ff00ff;
            font-weight: bold;
            text-transform: uppercase;
            animation: glitch 1s infinite;
            position: relative;
            padding: 6px 12px;
            border-radius: 6px;
            background: rgba(255, 0, 255, 0.1);
            transition: all 0.3s ease;
        }

        .update-glitch:hover {
            background: rgba(255, 0, 255, 0.3);
            transform: translateY(-2px);
        }

        /* அனிமேஷன்கள் */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes glitch {
            0% { text-shadow: -1px 0 #ff00ff, 1px 0 #00ffff; transform: translate(0); }
            25% { text-shadow: 1px 0 #ff00ff, -1px 0 #00ffff; transform: translate(-1px, 1px); }
            50% { text-shadow: -1px 0 #00ffff, 1px 0 #ff00ff; transform: translate(1px, -1px); }
            75% { text-shadow: 1px 0 #00ffff, -1px 0 #ff00ff; transform: translate(-1px, 1px); }
            100% { text-shadow: -1px 0 #ff00ff, 1px 0 #00ffff; transform: translate(0); }
        }

        /* ஸ்க்ரோல் பார் டிசைன் */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(20, 20, 30, 0.5);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #00ff88, #0088ff);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #00ff88, #ff00ff);
        }

        /* மொபைல் பதிலளிப்பு */
        @media screen and (max-width: 768px) {
            body {
                padding: 10px 0;
            }
            
            .content-wrapper {
                gap: 10px;
            }
            
            .a-container, .b-container, .c-container {
                margin: 0 auto;
                width: 95%;
                padding: 15px;
            }
            
            .logo {
                font-size: 2.5rem;
                margin: 15px 0;
            }
            
            .icon-row {
                gap: 15px;
            }
            
            .icon {
                width: 45px;
                height: 45px;
            }
            
            .version-container {
                width: 95%;
                margin: 10px auto;
            }
            
            .vertical-line {
                left: 5px;
            }
        }
    </style>
</head>
<body>
    <!-- HTML கட்டமைப்பு மாற்றப்படவில்லை -->
    <div class="content-wrapper">
        <div class="logo-container" id="logoContainer">
            <h1 class="logo">SUPER</h1>
        </div>

        <div class="c-container" id="c-container" style="display: none;">
            <h4>தேடல் முடிவுகள்..</h4>
            <ul id="search-results">
                <!-- தேடல் முடிவுகள் இங்கு சேர்க்கப்படும் -->
            </ul>
        </div>
        
        <div class="vertical-line"></div>
        
        <div class="a-container">
            <div class="icon-row">
                <span class="icon" id="play-pause" aria-label="Play/Pause">
                    <svg width="24" height="24" viewBox="0 0 24 24">
                        <path id="play-path" d="M8 5v14l11-7z" />
                        <path id="pause-path" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" style="display: none;" />
                    </svg>
                </span>
                <span class="icon" id="next" aria-label="Next Track">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="#000000">
                        <path d="M4 4v16l12-8-12-8zm14 0h2v16h-2z"></path>
                    </svg>
                </span>
                <span class="icon" id="search">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="#000000">
                        <path d="M21.71 20.29l-5.37-5.37A7.92 7.92 0 0 0 18 10a8 8 0 1 0-8 8 7.92 7.92 0 0 0 4.92-1.66l5.37 5.37a1 1 0 0 0 1.42-1.42ZM10 16a6 6 0 1 1 6-6 6 6 0 0 1-6 6Z"></path>
                    </svg>
                </span>
                <span class="icon" id="list">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="#000000">
                        <path d="M4 6h16v2H4V6zm0 5h16v2H4v-2zm0 5h16v2H4v-2z"></path>
                    </svg>

   // Cache clearing on UPDATE click
const updateGlitch = document.querySelector('.update-glitch');
let isClearing = false;

updateGlitch.addEventListener('click', async function() {
    if (isClearing) return;
    isClearing = true;
    
    // Visual feedback
    const originalText = updateGlitch.textContent;
    updateGlitch.textContent = "Clearing...";
    updateGlitch.style.pointerEvents = 'none';

    try {
        // Clear localStorage
        localStorage.clear();
        
        // Clear caches
        if ('caches' in window) {
            const cacheKeys = await caches.keys();
            await Promise.all(cacheKeys.map(key => caches.delete(key)));
        }
        
        // Unregister service workers
        if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map(reg => reg.unregister()));
        }
        
        // Force reload after operations
        setTimeout(() => {
            window.location.reload(true);
        }, 1000);
        
    } catch (error) {
        console.error('Cache clearing failed:', error);
        updateGlitch.textContent = "Failed! Click again";
        setTimeout(() => {
            updateGlitch.textContent = originalText;
            updateGlitch.style.pointerEvents = 'auto';
            isClearing = false;
        }, 2000);
    }
});
