<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Global Sync Radio | Isai Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 1rem;
        }

        .radio-card {
            background: rgba(18, 25, 45, 0.75);
            backdrop-filter: blur(14px);
            border-radius: 3rem;
            padding: 2rem 2rem 2rem 2rem;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: all 0.2s ease;
        }

        .now-playing {
            text-align: center;
            margin: 1.5rem 0 2.5rem 0;
        }

        .song-title {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #FFFFFF 0%, #C0D4FF 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            word-break: break-word;
            line-height: 1.3;
        }

        .mode-badge {
            display: inline-block;
            margin-top: 1rem;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #9bb5ff;
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            letter-spacing: 0.3px;
        }

        .toggle-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            width: 100%;
            padding: 1rem 0;
            border-radius: 3rem;
            font-size: 1.6rem;
            font-weight: 600;
            color: #f0f3ff;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            backdrop-filter: blur(8px);
            background: rgba(30, 40, 65, 0.6);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }

        .toggle-btn:active {
            transform: scale(0.97);
            background: rgba(70, 100, 160, 0.5);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .sync-indicator {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 1.5rem;
            color: #5f7bbf;
            font-weight: 400;
            opacity: 0.7;
        }

        footer {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 1.8rem;
            color: #3f4e7a;
        }

        .loading {
            text-align: center;
            margin: 1rem 0;
            font-size: 0.9rem;
            color: #ffd966;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        @media (max-width: 500px) {
            .radio-card {
                padding: 1.5rem;
            }
            .song-title {
                font-size: 1.7rem;
            }
            .toggle-btn {
                font-size: 1.3rem;
                padding: 0.85rem 0;
            }
        }
    </style>
</head>
<body>

<div class="radio-card">
    <div class="now-playing">
        <div class="song-title" id="currentSongTitle">⟳ INITIALIZING</div>
        <div class="mode-badge" id="modeName">SYNC PREP</div>
    </div>
    <button class="toggle-btn" id="playPauseBtn">
        <span>▶</span> PLAY
    </button>
    <div class="sync-indicator">⚡ global timeline • all listeners same moment</div>
    <footer>radio sync • fixed order cycle</footer>
</div>

<script type="module">
    // ============================================================
    // 1. Import songList from isai.js (contains metadata)
    // ============================================================
    import { songList } from './isai.js';

    // DOM elements
    const songTitleElem = document.getElementById('currentSongTitle');
    const modeNameElem = document.getElementById('modeName');
    const playPauseBtn = document.getElementById('playPauseBtn');

    // Player state
    let audioElement = null;
    let isPlaying = true;
    let syncInterval = null;
    let durations = [];        // will be filled after loading
    let modes = [];            // will be built after durations
    let modeTotalDurations = [];
    let totalCycleDuration = 0;
    let ready = false;         // set to true after durations loaded

    // ============================================================
    // 2. Function to fetch durations for all songs automatically
    // ============================================================
    async function loadDurations(songs) {
        const promises = songs.map((song, index) => {
            return new Promise((resolve) => {
                const audio = new Audio();
                audio.preload = 'metadata';
                audio.src = song.url;
                audio.addEventListener('loadedmetadata', () => {
                    const duration = audio.duration;
                    // Clean up to free memory
                    audio.src = '';
                    audio.load();
                    resolve({ index, duration });
                });
                audio.addEventListener('error', () => {
                    console.warn(`Failed to load duration for ${song.title}, using fallback 180s`);
                    resolve({ index, duration: 180 }); // fallback
                });
                // Timeout in case metadata never loads
                setTimeout(() => {
                    if (audio.readyState < 1) {
                        console.warn(`Timeout loading ${song.title}, using fallback`);
                        resolve({ index, duration: 180 });
                    }
                }, 8000);
            });
        });

        const results = await Promise.all(promises);
        const durArray = new Array(songs.length);
        results.forEach(r => { durArray[r.index] = r.duration; });
        return durArray;
    }

    // ============================================================
    // 3. Build the 10 fixed playback modes (based on song indices)
    //    using the loaded durations for duration-based modes
    // ============================================================
    function buildModes(durationsArray) {
        const n = durationsArray.length;
        const modesList = [];

        // Mode 1: Original order
        modesList.push([...Array(n).keys()]);

        // Mode 2: Reverse order
        modesList.push([...Array(n).keys()].reverse());

        // Mode 3: Deterministic shuffle A (seed 42)
        const shuffleSeed = (arr, seed) => {
            const a = [...arr];
            let m = a.length;
            let rng = (s) => { let t = (s * 9301 + 49297) % 233280; return t / 233280; };
            let s = seed;
            while (m) {
                m--;
                s = (s * 1103515245 + 12345) & 0x7fffffff;
                let idx = Math.floor(rng(s) * (m+1));
                [a[m], a[idx]] = [a[idx], a[m]];
            }
            return a;
        };
        modesList.push(shuffleSeed([...Array(n).keys()], 42));
        modesList.push(shuffleSeed([...Array(n).keys()], 77));
        modesList.push(shuffleSeed([...Array(n).keys()], 101));

        // Mode 6: Even indices first
        const even = Array.from({ length: n }, (_, i) => i).filter(i => i % 2 === 0);
        const odd = Array.from({ length: n }, (_, i) => i).filter(i => i % 2 === 1);
        modesList.push([...even, ...odd]);

        // Mode 7: Odd indices first
        modesList.push([...odd, ...even]);

        // Mode 8: Alternating from start & end
        const alt = [];
        let left = 0, right = n-1;
        while (left <= right) {
            alt.push(left);
            if (left !== right) alt.push(right);
            left++;
            right--;
        }
        modesList.push(alt);

        // Mode 9: Ascending by duration
        const durIndices = [...Array(n).keys()].sort((a,b) => durationsArray[a] - durationsArray[b]);
        modesList.push(durIndices);

        // Mode 10: Descending by duration
        modesList.push([...durIndices].reverse());

        // Ensure exactly 10 modes (if songs less than 5? But we have 5 songs, so 10 modes are fine)
        return modesList.slice(0, 10);
    }

    // ============================================================
    // 4. Global sync engine (uses computed durations and modes)
    // ============================================================
    const EPOCH_START = new Date(Date.UTC(2025, 3, 1, 0, 0, 0)).getTime(); // April 1, 2025

    function getGlobalElapsedSeconds() {
        const now = Date.now();
        let elapsedMs = now - EPOCH_START;
        if (elapsedMs < 0) elapsedMs = 0;
        const totalMs = totalCycleDuration * 1000;
        const wrappedMs = elapsedMs % totalMs;
        return wrappedMs / 1000;
    }

    function getCurrentGlobalState() {
        let elapsedSec = getGlobalElapsedSeconds();
        let modeIndex = 0;
        let modeOffsetSec = elapsedSec;
        for (let i = 0; i < modeTotalDurations.length; i++) {
            const modeDur = modeTotalDurations[i];
            if (modeOffsetSec < modeDur) {
                modeIndex = i;
                break;
            }
            modeOffsetSec -= modeDur;
        }
        const modeOrder = modes[modeIndex];
        let songIdxInPlaylist = 0;
        let songOffsetSec = modeOffsetSec;
        let currentSongGlobalIdx = -1;
        for (let j = 0; j < modeOrder.length; j++) {
            const songId = modeOrder[j];
            const songDur = durations[songId];
            if (songOffsetSec < songDur) {
                currentSongGlobalIdx = songId;
                songIdxInPlaylist = j;
                break;
            }
            songOffsetSec -= songDur;
        }
        if (currentSongGlobalIdx === -1 && modeOrder.length) {
            currentSongGlobalIdx = modeOrder[modeOrder.length-1];
            songOffsetSec = durations[currentSongGlobalIdx] - 0.01;
            songIdxInPlaylist = modeOrder.length-1;
        }
        return {
            modeIndex,
            modeOffsetSec,
            songGlobalIndex: currentSongGlobalIdx,
            songPositionSec: songOffsetSec,
            songIdxInPlaylist,
            modeOrder
        };
    }

    function getModeDisplayName(modeIdx) {
        const names = [
            "🔁 ORDER", "🔂 REVERSE", "🎲 SHUFFLE A", "🎴 SHUFFLE B", "♻️ SHUFFLE C",
            "⚡ EVEN FIRST", "🌀 ODD FIRST", "🔄 END-ALT", "📈 DURATION ↑", "📉 DURATION ↓"
        ];
        return names[modeIdx] || `MODE ${modeIdx+1}`;
    }

    function syncToGlobalTime() {
        if (!ready) return;
        const state = getCurrentGlobalState();
        const { modeIndex, songGlobalIndex, songPositionSec, modeOrder } = state;
        const songData = songList[songGlobalIndex];
        const songTitle = songData.title;
        const songUrl = songData.url;

        songTitleElem.innerText = songTitle;
        modeNameElem.innerText = getModeDisplayName(modeIndex);

        const currentSrc = audioElement ? audioElement.src : '';
        const needNewSong = !audioElement || currentSrc !== songUrl;

        if (needNewSong) {
            const wasPlaying = isPlaying && audioElement ? !audioElement.paused : isPlaying;
            if (audioElement) {
                audioElement.pause();
                audioElement.src = '';
            }
            if (!audioElement) {
                audioElement = new Audio();
                audioElement.volume = 1;
                audioElement.preload = 'auto';
                audioElement.loop = false;
            }
            audioElement.src = songUrl;
            audioElement.load();
            const setPositionAndPlay = () => {
                if (audioElement.readyState >= 2) {
                    audioElement.currentTime = songPositionSec;
                    if (isPlaying) {
                        audioElement.play().catch(e => console.warn("play blocked", e));
                    }
                } else {
                    audioElement.addEventListener('canplay', function onCanPlay() {
                        audioElement.currentTime = songPositionSec;
                        if (isPlaying) audioElement.play().catch(e => null);
                        audioElement.removeEventListener('canplay', onCanPlay);
                    }, { once: true });
                }
            };
            setPositionAndPlay();
        } else {
            if (audioElement && Math.abs(audioElement.currentTime - songPositionSec) > 0.35) {
                audioElement.currentTime = songPositionSec;
                if (isPlaying && audioElement.paused) {
                    audioElement.play().catch(e => null);
                }
            }
            if (isPlaying && audioElement.paused) {
                audioElement.play().catch(e => null);
            } else if (!isPlaying && !audioElement.paused) {
                audioElement.pause();
            }
        }
    }

    function startSyncLoop() {
        if (syncInterval) clearInterval(syncInterval);
        syncInterval = setInterval(() => {
            syncToGlobalTime();
        }, 500);
        syncToGlobalTime();
    }

    function togglePlayPause() {
        if (!audioElement) {
            audioElement = new Audio();
            audioElement.volume = 1;
            isPlaying = true;
            startSyncLoop();
            return;
        }
        if (isPlaying) {
            isPlaying = false;
            audioElement.pause();
            playPauseBtn.innerHTML = '<span>⏹️</span> STOP';
            playPauseBtn.style.background = "rgba(200, 70, 70, 0.25)";
        } else {
            isPlaying = true;
            const state = getCurrentGlobalState();
            if (audioElement.src !== songList[state.songGlobalIndex].url) {
                syncToGlobalTime();
            } else {
                audioElement.currentTime = state.songPositionSec;
                audioElement.play().catch(e => console.warn("play resume error"));
            }
            playPauseBtn.innerHTML = '<span>▶</span> PLAY';
            playPauseBtn.style.background = "rgba(30, 40, 65, 0.6)";
        }
    }

    function updateButtonUI() {
        if (isPlaying) {
            playPauseBtn.innerHTML = '<span>▶</span> PLAY';
            playPauseBtn.style.background = "rgba(30, 40, 65, 0.6)";
        } else {
            playPauseBtn.innerHTML = '<span>⏹️</span> STOP';
            playPauseBtn.style.background = "rgba(200, 70, 70, 0.25)";
        }
    }

    // ============================================================
    // 5. Initialization: load durations, build modes, start player
    // ============================================================
    async function init() {
        songTitleElem.innerText = "⏳ Loading songs...";
        modeNameElem.innerText = "FETCHING DURATIONS";
        
        // Load durations
        durations = await loadDurations(songList);
        console.log("Durations:", durations);
        
        // Build modes based on actual durations
        modes = buildModes(durations);
        modeTotalDurations = modes.map(modeOrder => 
            modeOrder.reduce((sum, songIdx) => sum + durations[songIdx], 0)
        );
        totalCycleDuration = modeTotalDurations.reduce((a,b) => a+b, 0);
        
        ready = true;
        
        // Initialize audio and start sync
        audioElement = new Audio();
        audioElement.volume = 1;
        audioElement.preload = "auto";
        audioElement.controls = false;
        
        startSyncLoop();
        isPlaying = true;
        updateButtonUI();
        
        // Listen for visibility change to re-sync
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) syncToGlobalTime();
        });
        
        // Handle ended event (just in case)
        audioElement.addEventListener('ended', () => {
            syncToGlobalTime();
        });
        
        // Attach button listener
        playPauseBtn.addEventListener('click', () => {
            togglePlayPause();
            updateButtonUI();
        });
        
        // Initial sync attempt (will set correct song)
        syncToGlobalTime();
        
        // Attempt to autoplay if allowed; if not, user can click PLAY.
        if (audioElement && isPlaying) {
            audioElement.play().catch(e => {
                console.log("Autoplay blocked, waiting for user click.");
                isPlaying = false;
                updateButtonUI();
                syncToGlobalTime(); // UI still shows current song but paused
            });
        }
    }

    init();
</script>
</body>
</html>
