<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Global Sync Radio | Isai Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 1rem;
        }

        .radio-card {
            background: rgba(18, 25, 45, 0.75);
            backdrop-filter: blur(14px);
            border-radius: 3rem;
            padding: 2rem 2rem 2rem 2rem;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: all 0.2s ease;
        }

        .now-playing {
            text-align: center;
            margin: 1.5rem 0 1rem 0;
        }

        .song-title {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #FFFFFF 0%, #C0D4FF 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            word-break: break-word;
            line-height: 1.3;
        }

        .song-details {
            margin-top: 0.75rem;
            font-size: 0.8rem;
            color: #aab8e5;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            display: inline-block;
            backdrop-filter: blur(4px);
            line-height: 1.4;
            max-width: 90%;
        }

        .mode-badge {
            display: inline-block;
            margin-top: 1rem;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #9bb5ff;
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            letter-spacing: 0.3px;
        }

        .toggle-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            width: 100%;
            padding: 1rem 0;
            border-radius: 3rem;
            font-size: 1.6rem;
            font-weight: 600;
            color: #f0f3ff;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            backdrop-filter: blur(8px);
            background: rgba(30, 40, 65, 0.6);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }

        .toggle-btn:active {
            transform: scale(0.97);
            background: rgba(70, 100, 160, 0.5);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .sync-indicator {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 1.5rem;
            color: #5f7bbf;
            font-weight: 400;
            opacity: 0.7;
        }

        footer {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 1.8rem;
            color: #3f4e7a;
        }

        @media (max-width: 500px) {
            .radio-card {
                padding: 1.5rem;
            }
            .song-title {
                font-size: 1.5rem;
            }
            .toggle-btn {
                font-size: 1.3rem;
                padding: 0.85rem 0;
            }
            .song-details {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

<div class="radio-card">
    <div class="now-playing">
        <div class="song-title" id="currentSongTitle">⟳ INITIALIZING</div>
        <div class="song-details" id="currentSongDetails"></div>
        <div class="mode-badge" id="modeName">SYNC PREP</div>
    </div>
    <button class="toggle-btn" id="playPauseBtn">
        <span>▶</span> PLAY
    </button>
    <div class="sync-indicator">⚡ boundary sync • no mid‑song seek • perfect continuity</div>
    <footer>radio sync • fixed order cycle</footer>
</div>

<script type="module">
    // ============================================================
    // 1. Import songs from isai.js (simple format)
    // ============================================================
    import { songs } from './isai.js';

const songList = songs.map(song => ({
    title: song.file.replace(/\.(mp3|m4a|MP3|M4A)$/i, ''),
    url: song.url,
    details: song.details
}));

    // DOM elements
    const songTitleElem = document.getElementById('currentSongTitle');
    const songDetailsElem = document.getElementById('currentSongDetails');
    const modeNameElem = document.getElementById('modeName');
    const playPauseBtn = document.getElementById('playPauseBtn');

    // Player state
    let audioElement = null;
    let isPlaying = true;
    let switchTimeout = null;
    let durations = [];
    let modes = [];
    let modeTotalDurations = [];
    let totalCycleDuration = 0;
    let ready = false;
    let currentSongGlobalIndex = -1;
    let currentModeIndex = -1;

    // ============================================================
    // 2. Auto-duration loading (unchanged)
    // ============================================================
    async function loadDurations(songsArray) {
        const promises = songsArray.map((song, index) => {
            return new Promise((resolve) => {
                const audio = new Audio();
                audio.preload = 'metadata';
                audio.src = song.url;
                audio.addEventListener('loadedmetadata', () => {
                    const duration = audio.duration;
                    audio.src = '';
                    audio.load();
                    resolve({ index, duration });
                });
                audio.addEventListener('error', () => {
                    console.warn(`Failed to load duration for ${song.title}, using fallback 180s`);
                    resolve({ index, duration: 180 });
                });
                setTimeout(() => {
                    if (audio.readyState < 1) {
                        console.warn(`Timeout loading ${song.title}, using fallback`);
                        resolve({ index, duration: 180 });
                    }
                }, 8000);
            });
        });
        const results = await Promise.all(promises);
        const durArray = new Array(songsArray.length);
        results.forEach(r => { durArray[r.index] = r.duration; });
        return durArray;
    }

    // ============================================================
    // 3. Build 10 fixed modes (unchanged)
    // ============================================================
    function buildModes(durationsArray) {
        const n = durationsArray.length;
        const modesList = [];

        modesList.push([...Array(n).keys()]);
        modesList.push([...Array(n).keys()].reverse());

        const shuffleSeed = (arr, seed) => {
            const a = [...arr];
            let m = a.length;
            let rng = (s) => { let t = (s * 9301 + 49297) % 233280; return t / 233280; };
            let s = seed;
            while (m) {
                m--;
                s = (s * 1103515245 + 12345) & 0x7fffffff;
                let idx = Math.floor(rng(s) * (m+1));
                [a[m], a[idx]] = [a[idx], a[m]];
            }
            return a;
        };
        modesList.push(shuffleSeed([...Array(n).keys()], 42));
        modesList.push(shuffleSeed([...Array(n).keys()], 77));
        modesList.push(shuffleSeed([...Array(n).keys()], 101));

        const even = Array.from({ length: n }, (_, i) => i).filter(i => i % 2 === 0);
        const odd = Array.from({ length: n }, (_, i) => i).filter(i => i % 2 === 1);
        modesList.push([...even, ...odd]);
        modesList.push([...odd, ...even]);

        const alt = [];
        let left = 0, right = n-1;
        while (left <= right) {
            alt.push(left);
            if (left !== right) alt.push(right);
            left++;
            right--;
        }
        modesList.push(alt);

        const durIndices = [...Array(n).keys()].sort((a,b) => durationsArray[a] - durationsArray[b]);
        modesList.push(durIndices);
        modesList.push([...durIndices].reverse());

        return modesList.slice(0, 10);
    }

    // ============================================================
    // 4. Global timeline helpers (same epoch)
    // ============================================================
    const EPOCH_START = new Date(Date.UTC(2025, 3, 1, 0, 0, 0)).getTime();

    function getGlobalElapsedSeconds() {
        const now = Date.now();
        let elapsedMs = now - EPOCH_START;
        if (elapsedMs < 0) elapsedMs = 0;
        const totalMs = totalCycleDuration * 1000;
        const wrappedMs = elapsedMs % totalMs;
        return wrappedMs / 1000;
    }

    // Returns { modeIndex, songIndexInMode, songGlobalIndex, positionInSongSec, remainingInSongMs }
    function getCurrentGlobalState() {
        let elapsedSec = getGlobalElapsedSeconds();
        let modeIndex = 0;
        let modeOffsetSec = elapsedSec;
        for (let i = 0; i < modeTotalDurations.length; i++) {
            if (modeOffsetSec < modeTotalDurations[i]) {
                modeIndex = i;
                break;
            }
            modeOffsetSec -= modeTotalDurations[i];
        }
        const modeOrder = modes[modeIndex];
        let songIdxInPlaylist = 0;
        let songOffsetSec = modeOffsetSec;
        let currentSongGlobalIdx = -1;
        for (let j = 0; j < modeOrder.length; j++) {
            const songId = modeOrder[j];
            const songDur = durations[songId];
            if (songOffsetSec < songDur) {
                currentSongGlobalIdx = songId;
                songIdxInPlaylist = j;
                break;
            }
            songOffsetSec -= songDur;
        }
        if (currentSongGlobalIdx === -1 && modeOrder.length) {
            currentSongGlobalIdx = modeOrder[modeOrder.length-1];
            songOffsetSec = durations[currentSongGlobalIdx] - 0.01;
        }
        const remainingSec = durations[currentSongGlobalIdx] - songOffsetSec;
        const remainingMs = Math.max(0, remainingSec * 1000);
        return {
            modeIndex,
            songGlobalIndex: currentSongGlobalIdx,
            positionInSongSec: songOffsetSec,
            remainingMs: remainingMs,
            modeOrder
        };
    }

    function getModeDisplayName(modeIdx) {
        const names = [
            "🔁 ORDER", "🔂 REVERSE", "🎲 SHUFFLE A", "🎴 SHUFFLE B", "♻️ SHUFFLE C",
            "⚡ EVEN FIRST", "🌀 ODD FIRST", "🔄 END-ALT", "📈 DURATION ↑", "📉 DURATION ↓"
        ];
        return names[modeIdx] || `MODE ${modeIdx+1}`;
    }

    // ============================================================
    // 5. Core sync: only at song boundaries (no mid‑song seek)
    // ============================================================
    let isSwitching = false;

    function scheduleNextSwitch() {
        if (switchTimeout) clearTimeout(switchTimeout);
        if (!ready || !isPlaying) return;

        const state = getCurrentGlobalState();
        const { modeIndex, songGlobalIndex, remainingMs } = state;
        const songData = songList[songGlobalIndex];
        
        // Update UI immediately
        songTitleElem.innerText = songData.title;
        songDetailsElem.innerText = songData.details || "";
        modeNameElem.innerText = getModeDisplayName(modeIndex);
        
        // If we are already playing the correct song, just schedule the next switch
        if (audioElement && audioElement.src === songData.url && !audioElement.ended) {
            // No seeking, just wait for remaining time
            if (remainingMs > 100) {
                switchTimeout = setTimeout(() => {
                    switchToNextSong();
                }, remainingMs);
            } else {
                // Very short remaining, switch immediately
                switchToNextSong();
            }
        } else {
            // Need to load the correct song and seek to the correct position (only once at join/resume)
            loadAndSeekToCurrentSong();
        }
    }

    function loadAndSeekToCurrentSong() {
        if (!ready) return;
        const state = getCurrentGlobalState();
        const { modeIndex, songGlobalIndex, positionInSongSec } = state;
        const songData = songList[songGlobalIndex];
        
        // Update UI
        songTitleElem.innerText = songData.title;
        songDetailsElem.innerText = songData.details || "";
        modeNameElem.innerText = getModeDisplayName(modeIndex);
        
        if (!audioElement) {
            audioElement = new Audio();
            audioElement.volume = 1;
            audioElement.preload = 'auto';
            audioElement.loop = false;
        }
        
        // If same song and already playing, just ensure position is correct (initial join only)
        if (audioElement.src === songData.url && Math.abs(audioElement.currentTime - positionInSongSec) < 1) {
            // Already correct, just schedule next switch
            scheduleNextSwitch();
            return;
        }
        
        // Load new song and seek to global position (this happens only when joining or resuming)
        audioElement.pause();
        audioElement.src = songData.url;
        audioElement.load();
        
        const onReady = () => {
            if (audioElement.readyState >= 2) {
                audioElement.currentTime = positionInSongSec;
                if (isPlaying) audioElement.play().catch(e => console.warn("play error"));
                audioElement.removeEventListener('canplay', onReady);
                // After seeking, schedule next switch based on remaining time
                const newState = getCurrentGlobalState();
                const remainingMs = newState.remainingMs;
                if (remainingMs > 100) {
                    if (switchTimeout) clearTimeout(switchTimeout);
                    switchTimeout = setTimeout(() => switchToNextSong(), remainingMs);
                } else {
                    switchToNextSong();
                }
            }
        };
        audioElement.addEventListener('canplay', onReady, { once: true });
        // Fallback timeout
        setTimeout(() => {
            if (audioElement.readyState < 2) {
                console.warn("Fallback: forcing play");
                audioElement.currentTime = positionInSongSec;
                if (isPlaying) audioElement.play().catch(e => null);
                scheduleNextSwitch();
            }
        }, 2000);
    }

    function switchToNextSong() {
        if (isSwitching) return;
        isSwitching = true;
        
        // The global timeline has moved to the next song (or same song if drift)
        // We simply reload from current global state (which will be the correct next song)
        const state = getCurrentGlobalState();
        const { songGlobalIndex, positionInSongSec } = state;
        const songData = songList[songGlobalIndex];
        
        if (!audioElement) {
            audioElement = new Audio();
            audioElement.volume = 1;
            audioElement.preload = 'auto';
        }
        
        // If the same song is still playing (should not happen), just reschedule
        if (audioElement.src === songData.url && Math.abs(audioElement.currentTime - positionInSongSec) < 2) {
            // Very minor drift, just continue
            isSwitching = false;
            scheduleNextSwitch();
            return;
        }
        
        // Load the next song from the beginning (or correct offset if needed)
        audioElement.pause();
        audioElement.src = songData.url;
        audioElement.load();
        
        const onCanPlay = () => {
            if (audioElement.readyState >= 2) {
                // Seek to the correct position (which is near the beginning of the new song)
                audioElement.currentTime = positionInSongSec;
                if (isPlaying) audioElement.play().catch(e => console.warn("play error"));
                audioElement.removeEventListener('canplay', onCanPlay);
                isSwitching = false;
                scheduleNextSwitch(); // schedule the next boundary
            }
        };
        audioElement.addEventListener('canplay', onCanPlay, { once: true });
        // Fallback
        setTimeout(() => {
            if (audioElement.readyState < 2) {
                audioElement.currentTime = positionInSongSec;
                if (isPlaying) audioElement.play().catch(e => null);
                isSwitching = false;
                scheduleNextSwitch();
            }
        }, 2000);
    }

    // ============================================================
    // 6. Play/Pause toggle (no extra features)
    // ============================================================
    function togglePlayPause() {
        if (!ready) return;
        if (isPlaying) {
            isPlaying = false;
            if (audioElement) audioElement.pause();
            if (switchTimeout) clearTimeout(switchTimeout);
            playPauseBtn.innerHTML = '<span>⏹️</span> STOP';
            playPauseBtn.style.background = "rgba(200, 70, 70, 0.25)";
        } else {
            isPlaying = true;
            // Resume from current global position (will seek once)
            loadAndSeekToCurrentSong();
            playPauseBtn.innerHTML = '<span>▶</span> PLAY';
            playPauseBtn.style.background = "rgba(30, 40, 65, 0.6)";
        }
    }

    function updateButtonUI() {
        if (isPlaying) {
            playPauseBtn.innerHTML = '<span>▶</span> PLAY';
            playPauseBtn.style.background = "rgba(30, 40, 65, 0.6)";
        } else {
            playPauseBtn.innerHTML = '<span>⏹️</span> STOP';
            playPauseBtn.style.background = "rgba(200, 70, 70, 0.25)";
        }
    }

    // ============================================================
    // 7. Initialization
    // ============================================================
    async function init() {
        songTitleElem.innerText = "⏳ Loading songs...";
        songDetailsElem.innerText = "";
        modeNameElem.innerText = "FETCHING DURATIONS";
        
        durations = await loadDurations(songList);
        console.log("Durations:", durations);
        
        modes = buildModes(durations);
        modeTotalDurations = modes.map(modeOrder => 
            modeOrder.reduce((sum, idx) => sum + durations[idx], 0)
        );
        totalCycleDuration = modeTotalDurations.reduce((a,b) => a+b, 0);
        
        ready = true;
        
        audioElement = new Audio();
        audioElement.volume = 1;
        audioElement.preload = "auto";
        audioElement.controls = false;
        
        // Start the player from the current global position
        loadAndSeekToCurrentSong();
        isPlaying = true;
        updateButtonUI();
        
        // Listen for visibility changes to reschedule if needed
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && isPlaying) {
                // Re-sync on return (but no seek within song)
                scheduleNextSwitch();
            }
        });
        
        playPauseBtn.addEventListener('click', () => {
            togglePlayPause();
        });
        
        // If autoplay is blocked, the user must click PLAY
        if (audioElement && isPlaying) {
            audioElement.play().catch(e => {
                console.log("Autoplay blocked, waiting for user click.");
                isPlaying = false;
                updateButtonUI();
                if (switchTimeout) clearTimeout(switchTimeout);
            });
        }
    }
    
    init();
</script>
</body>
</html>
