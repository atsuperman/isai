<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Global Sync Radio | Isai Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 1rem;
        }

        .radio-card {
            background: rgba(18, 25, 45, 0.75);
            backdrop-filter: blur(14px);
            border-radius: 3rem;
            padding: 2rem;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .now-playing {
            text-align: center;
            margin: 1.5rem 0 1rem;
        }

        .song-title {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #FFFFFF 0%, #C0D4FF 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            word-break: break-word;
        }

        .song-details {
            margin-top: 0.75rem;
            font-size: 0.8rem;
            color: #aab8e5;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            display: inline-block;
            line-height: 1.4;
        }

        .mode-badge {
            display: inline-block;
            margin-top: 1rem;
            background: rgba(255, 255, 255, 0.08);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            color: #9bb5ff;
        }

        .toggle-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            width: 100%;
            padding: 1rem;
            border-radius: 3rem;
            font-size: 1.6rem;
            font-weight: 600;
            color: #f0f3ff;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }

        .toggle-btn:active {
            transform: scale(0.97);
        }

        .sync-indicator {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 1.5rem;
            color: #5f7bbf;
        }

        footer {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 1.8rem;
            color: #3f4e7a;
        }

        @media (max-width: 500px) {
            .radio-card { padding: 1.5rem; }
            .song-title { font-size: 1.5rem; }
            .toggle-btn { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
<div class="radio-card">
    <div class="now-playing">
        <div class="song-title" id="currentSongTitle">⟳ SYNCING</div>
        <div class="song-details" id="currentSongDetails"></div>
        <div class="mode-badge" id="modeName"></div>
    </div>
    <button class="toggle-btn" id="playPauseBtn">
        <span>▶</span> PLAY
    </button>
    <div class="sync-indicator">⚡ 4‑min slots • mode changes every 7 days • perfect sync</div>
    <footer>radio sync • fixed schedule • no seeking</footer>
</div>

<script type="module">
    import { songs } from './isai.js';

    // Build song list with titles, full URLs, details
    const songList = songs.map(song => ({
        title: song.file.replace(/\.(mp3|m4a|MP3|M4A)$/i, ''),
        url: song.url,
        details: song.details
    }));

    // ---------- Fixed schedule parameters ----------
    const EPOCH = new Date(Date.UTC(2025, 3, 1, 0, 0, 0)).getTime(); // April 1, 2025 UTC
    const MODE_DURATION_MS = 7 * 24 * 3600 * 1000; // 7 days
    const SLOT_DURATION_MS = 4 * 60 * 1000;       // 4 minutes

    // ---------- Build the 10 modes (same as before) ----------
    function buildModes(songCount) {
        const indices = [...Array(songCount).keys()];
        const modesList = [];

        modesList.push([...indices]);                          // original
        modesList.push([...indices].reverse());                // reverse

        const shuffleSeed = (arr, seed) => {
            const a = [...arr];
            let m = a.length;
            let rng = (s) => { let t = (s * 9301 + 49297) % 233280; return t / 233280; };
            let s = seed;
            while (m) {
                m--;
                s = (s * 1103515245 + 12345) & 0x7fffffff;
                let idx = Math.floor(rng(s) * (m+1));
                [a[m], a[idx]] = [a[idx], a[m]];
            }
            return a;
        };
        modesList.push(shuffleSeed([...indices], 42));
        modesList.push(shuffleSeed([...indices], 77));
        modesList.push(shuffleSeed([...indices], 101));

        const even = indices.filter(i => i % 2 === 0);
        const odd = indices.filter(i => i % 2 === 1);
        modesList.push([...even, ...odd]);                     // even first
        modesList.push([...odd, ...even]);                     // odd first

        const alt = [];
        let left = 0, right = songCount-1;
        while (left <= right) {
            alt.push(left);
            if (left !== right) alt.push(right);
            left++; right--;
        }
        modesList.push(alt);                                   // end‑alternating

        const durIndices = [...indices]; // we don't have real durations, but we still need 10 modes
        // For the last two, we can use original order (since no durations)
        modesList.push([...indices]);                          // placeholder for "duration ↑"
        modesList.push([...indices].reverse());                // placeholder for "duration ↓"

        return modesList.slice(0, 10);
    }

    const modes = buildModes(songList.length);
    const MODE_NAMES = [
        "🔁 ORDER", "🔂 REVERSE", "🎲 SHUFFLE A", "🎴 SHUFFLE B", "♻️ SHUFFLE C",
        "⚡ EVEN FIRST", "🌀 ODD FIRST", "🔄 END-ALT", "📈 DURATION ↑", "📉 DURATION ↓"
    ];

    // ---------- Global schedule calculation ----------
    function getCurrentSchedule() {
        const now = Date.now();
        let elapsed = now - EPOCH;
        if (elapsed < 0) elapsed = 0;
        
        const modeIndex = Math.floor(elapsed / MODE_DURATION_MS) % modes.length;
        const modeStartOffset = Math.floor(elapsed / MODE_DURATION_MS) * MODE_DURATION_MS;
        const elapsedInMode = elapsed - modeStartOffset;
        
        const slotIndex = Math.floor(elapsedInMode / SLOT_DURATION_MS);
        const offsetInSlot = elapsedInMode % SLOT_DURATION_MS;
        
        const currentModeOrder = modes[modeIndex];
        const songPositionInMode = slotIndex % currentModeOrder.length;
        const songGlobalIndex = currentModeOrder[songPositionInMode];
        
        return {
            modeIndex,
            songGlobalIndex,
            offsetInSlot,        // milliseconds into the current 4‑min slot
            nextSwitchMs: SLOT_DURATION_MS - offsetInSlot
        };
    }

    // ---------- Player state ----------
    let audio = null;
    let isPlaying = true;
    let switchTimeout = null;
    let currentSongUrl = null;
    let currentModeIndex = -1;
    
    const songTitleElem = document.getElementById('currentSongTitle');
    const songDetailsElem = document.getElementById('currentSongDetails');
    const modeNameElem = document.getElementById('modeName');
    const playPauseBtn = document.getElementById('playPauseBtn');

    function loadCurrentSong() {
        const { modeIndex, songGlobalIndex, offsetInSlot } = getCurrentSchedule();
        const song = songList[songGlobalIndex];
        
        // Update UI
        songTitleElem.innerText = song.title;
        songDetailsElem.innerText = song.details || "";
        modeNameElem.innerText = MODE_NAMES[modeIndex];
        currentModeIndex = modeIndex;
        
        // If same song and already playing, just ensure correct time (only if user paused/resumed)
        if (audio && audio.src === song.url && !audio.ended) {
            const targetTime = offsetInSlot / 1000;
            if (Math.abs(audio.currentTime - targetTime) > 0.5) {
                audio.currentTime = targetTime;
            }
            if (isPlaying && audio.paused) audio.play().catch(e => console.warn);
            return;
        }
        
        // Load new song
        if (audio) {
            audio.pause();
            audio.src = '';
            audio.load();
        } else {
            audio = new Audio();
            audio.volume = 1;
            audio.preload = 'auto';
        }
        
        audio.src = song.url;
        audio.load();
        currentSongUrl = song.url;
        
        const startAt = offsetInSlot / 1000;
        const onCanPlay = () => {
            if (audio.readyState >= 2) {
                audio.currentTime = startAt;
                if (isPlaying) audio.play().catch(e => console.warn("autoplay blocked"));
                audio.removeEventListener('canplay', onCanPlay);
            }
        };
        audio.addEventListener('canplay', onCanPlay, { once: true });
        // fallback
        setTimeout(() => {
            if (audio.readyState < 2) {
                audio.currentTime = startAt;
                if (isPlaying) audio.play().catch(e => null);
            }
        }, 2000);
    }
    
    function scheduleNextSwitch() {
        if (switchTimeout) clearTimeout(switchTimeout);
        const { nextSwitchMs } = getCurrentSchedule();
        switchTimeout = setTimeout(() => {
            // Time to switch to the next song slot
            loadCurrentSong();
            scheduleNextSwitch(); // reschedule for the following slot
        }, nextSwitchMs);
    }
    
    function startRadio() {
        if (!audio) {
            audio = new Audio();
            audio.volume = 1;
            audio.preload = 'auto';
        }
        loadCurrentSong();
        scheduleNextSwitch();
    }
    
    function stopRadio() {
        if (switchTimeout) clearTimeout(switchTimeout);
        if (audio) audio.pause();
    }
    
    function togglePlayPause() {
        if (isPlaying) {
            isPlaying = false;
            stopRadio();
            playPauseBtn.innerHTML = '<span>⏹️</span> STOP';
            playPauseBtn.style.background = "rgba(200, 70, 70, 0.25)";
        } else {
            isPlaying = true;
            startRadio();
            playPauseBtn.innerHTML = '<span>▶</span> PLAY';
            playPauseBtn.style.background = "rgba(30, 40, 65, 0.6)";
        }
    }
    
    function updateButtonUI() {
        if (isPlaying) {
            playPauseBtn.innerHTML = '<span>▶</span> PLAY';
            playPauseBtn.style.background = "rgba(30, 40, 65, 0.6)";
        } else {
            playPauseBtn.innerHTML = '<span>⏹️</span> STOP';
            playPauseBtn.style.background = "rgba(200, 70, 70, 0.25)";
        }
    }
    
    // Handle visibility changes (re‑sync when tab becomes active)
    document.addEventListener('visibilitychange', () => {
        if (!document.hidden && isPlaying) {
            // Recalculate schedule and reload current song (may have drifted)
            if (switchTimeout) clearTimeout(switchTimeout);
            loadCurrentSong();
            scheduleNextSwitch();
        }
    });
    
    // Initialise
    startRadio();
    updateButtonUI();
    
    playPauseBtn.addEventListener('click', togglePlayPause);
    
    // Autoplay may be blocked; if so, show STOP state and wait for user click
    if (audio) {
        audio.play().catch(e => {
            console.log("Autoplay blocked – click PLAY to start");
            isPlaying = false;
            stopRadio();
            updateButtonUI();
        });
    }
</script>
</body>
</html>
