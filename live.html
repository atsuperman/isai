<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Global Sync Radio | Isai Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            min-height: 100vh;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', system-ui, sans-serif;
            padding: 0.5rem;
        }

        .radio-card {
            background: #fef9e6;
            border-radius: 3rem;
            padding: 2rem;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
        }
        .now-playing { text-align: center; margin: 1rem 0; }
        .song-title {
            font-size: 2rem;
            font-weight: 600;
            color: #000000;
            word-break: break-word;
        }
        .song-details {
            margin-top: 0.75rem;
            font-size: 0.8rem;
            color: #333333;
            background: rgba(0,0,0,0.05);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            display: inline-block;
        }
        .next-song {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #222222;
            background: rgba(0,0,0,0.05);
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            display: inline-block;
        }
        .next-song span { opacity: 0.7; font-size: 0.7rem; }

        .toggle-btn {
            background: #e0e0e0;
            border: 1.5px solid #cccccc;
            width: 100%;
            padding: 1rem;
            border-radius: 3rem;
            font-size: 1.6rem;
            font-weight: 600;
            color: #111111;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            margin-top: 1.5rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .toggle-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .toggle-btn:active { transform: scale(0.97); }

        .toggle-btn.loading {
            position: relative;
            pointer-events: none;
            opacity: 0.7;
        }
        .toggle-btn.loading::after {
            content: "";
            position: absolute;
            width: 1.2rem;
            height: 1.2rem;
            border: 2px solid #333;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 0.5rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .logo-container {
            text-align: center;
            width: 100%;
        }

        .logo {
            font-family: 'Arial', sans-serif;
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ff0000, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: green;
            letter-spacing: -2px;
            z-index: 1000;
            padding: 0;
            position: relative;
            margin: 10px 0 5px 0;
            text-align: center;
            display: inline-block;
        }

        .logo::after {
            content: 'இசை';
            font-family: 'Arial Unicode MS', 'Nirmala UI', sans-serif;
            font-size: 0.3em;
            background: linear-gradient(45deg, #333, #666);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            position: absolute;
            right: -0.2em;
            bottom: -0.6em;
            text-transform: none;
            letter-spacing: 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        @media (max-width: 500px) {
            .radio-card { padding: 1.5rem; }
            .song-title { font-size: 1.5rem; }
            .toggle-btn { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
  <div class="logo-container">
    <h1 class="logo">SUPER</h1>
  </div>
  <div class="radio-card">
    <div class="now-playing">
        <div class="song-title" id="currentSongTitle">⟳ SYNCING</div>
        <div class="song-details" id="currentSongDetails"></div>
        <div class="next-song"><span>⏩ Coming up next:</span> <span id="nextSongTitle">—</span></div>
    </div>
    <button class="toggle-btn" id="playPauseBtn"><span>▶</span> PLAY</button>
  </div>

<script type="module">
    import { songs } from './isai.js';

    const songList = songs.map(song => ({
        title: song.file.replace(/\.(mp3|m4a|MP3|M4A)$/i, ''),
        url: song.url,
        details: song.details,
        duration: song.duration
    }));

    const EPOCH = new Date(Date.UTC(2026, 3, 1, 0, 0, 0)).getTime();

    function buildModes(count) {
        const indices = [...Array(count).keys()];
        const modes = [];
        modes.push([...indices]);
        modes.push([...indices].reverse());

        const shuffleSeed = (arr, seed) => {
            const a = [...arr];
            let m = a.length;
            let rng = (s) => { let t = (s * 9301 + 49297) % 233280; return t / 233280; };
            let s = seed;
            while (m) {
                m--;
                s = (s * 1103515245 + 12345) & 0x7fffffff;
                let idx = Math.floor(rng(s) * (m+1));
                [a[m], a[idx]] = [a[idx], a[m]];
            }
            return a;
        };
        modes.push(shuffleSeed([...indices], 42));
        modes.push(shuffleSeed([...indices], 77));
        modes.push(shuffleSeed([...indices], 101));

        const even = indices.filter(i => i % 2 === 0);
        const odd = indices.filter(i => i % 2 === 1);
        modes.push([...even, ...odd]);
        modes.push([...odd, ...even]);

        const alt = [];
        let left = 0, right = count-1;
        while (left <= right) {
            alt.push(left);
            if (left !== right) alt.push(right);
            left++; right--;
        }
        modes.push(alt);
        modes.push([...indices]);
        modes.push([...indices].reverse());

        return modes.slice(0, 10);
    }

    const modes = buildModes(songList.length);
    const modeTotalDurationsMs = modes.map(modeOrder =>
        modeOrder.reduce((sum, idx) => sum + songList[idx].duration, 0) * 1000
    );
    const TOTAL_CYCLE_MS = modeTotalDurationsMs.reduce((a, b) => a + b, 0);

    function getCurrentSong() {
        const now = Date.now();
        let elapsedMs = now - EPOCH;
        if (elapsedMs < 0) elapsedMs = 0;
        
        let cycleOffsetMs = elapsedMs % TOTAL_CYCLE_MS;
        
        let modeIndex = 0;
        for (let i = 0; i < modeTotalDurationsMs.length; i++) {
            if (cycleOffsetMs < modeTotalDurationsMs[i]) {
                modeIndex = i;
                break;
            }
            cycleOffsetMs -= modeTotalDurationsMs[i];
        }
        
        const modeOrder = modes[modeIndex];
        let accumulated = 0;
        let songPosInMode = -1;
        let offsetInSongMs = 0;
        for (let i = 0; i < modeOrder.length; i++) {
            const songId = modeOrder[i];
            const durMs = songList[songId].duration * 1000;
            if (cycleOffsetMs < accumulated + durMs) {
                songPosInMode = i;
                offsetInSongMs = cycleOffsetMs - accumulated;
                break;
            }
            accumulated += durMs;
        }
        
        if (songPosInMode === -1 && modeOrder.length) {
            songPosInMode = modeOrder.length - 1;
            offsetInSongMs = songList[modeOrder[songPosInMode]].duration * 1000 - 1;
        }
        
        const currentSongGlobalIdx = modeOrder[songPosInMode];
        const remainingInSongMs = (songList[currentSongGlobalIdx].duration * 1000) - offsetInSongMs;
        
        let nextSongGlobalIdx = null;
        let nextPos = songPosInMode + 1;
        if (nextPos >= modeOrder.length) {
            let nextModeIndex = (modeIndex + 1) % modes.length;
            nextSongGlobalIdx = modes[nextModeIndex][0];
        } else {
            nextSongGlobalIdx = modeOrder[nextPos];
        }
        
        return {
            songGlobalIndex: currentSongGlobalIdx,
            offsetInSongMs,
            remainingInSongMs,
            nextSongGlobalIndex: nextSongGlobalIdx
        };
    }

    const songTitleElem = document.getElementById('currentSongTitle');
    const songDetailsElem = document.getElementById('currentSongDetails');
    const nextSongTitleElem = document.getElementById('nextSongTitle');
    const playPauseBtn = document.getElementById('playPauseBtn');

    let audio = null;
    let nextAudio = null;
    let isLoading = false;
    let isPlaying = true;
    let switchTimeout = null;
    let isSwitching = false;

    function updateUI(songIdx, nextIdx) {
        const song = songList[songIdx];
        songTitleElem.innerText = song.title;
        songDetailsElem.innerText = song.details || "";
        nextSongTitleElem.innerText = songList[nextIdx] ? songList[nextIdx].title : "—";

        // ==================== MEDIA SESSION - Notification / Lock Screen ====================
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: song.title,
                artist: "SUPER இசை",
                album: "",
                artwork: [{
                    src: "",
                    sizes: "512x512"
                }]
            });

            // Pause button-ஐ முழுவதும் மறைக்க (Stop logic மட்டும் வேலை செய்யும்)
            navigator.mediaSession.setActionHandler('pause', null);
            navigator.mediaSession.setActionHandler('play', null);

            // வேறு எந்த control-உம் இல்லை
            navigator.mediaSession.setActionHandler('seekbackward', null);
            navigator.mediaSession.setActionHandler('seekforward', null);
            navigator.mediaSession.setActionHandler('seekto', null);
            navigator.mediaSession.setActionHandler('previoustrack', null);
            navigator.mediaSession.setActionHandler('nexttrack', null);
        }
    }

    function preloadNextSong(nextIdx) {
        if (nextIdx == null) return;
        if (!nextAudio) {
            nextAudio = new Audio();
            nextAudio.preload = 'auto';
        }
        nextAudio.src = songList[nextIdx].url;
        nextAudio.load();
    }

    function loadNextSongFromGlobal() {
        if (isSwitching || isLoading) return;
        isSwitching = true;

        const { songGlobalIndex, offsetInSongMs, remainingInSongMs, nextSongGlobalIndex } = getCurrentSong();
        const song = songList[songGlobalIndex];
        updateUI(songGlobalIndex, nextSongGlobalIndex);

        const targetSec = offsetInSongMs / 1000;

        if (audio) {
            audio.pause();
            audio.src = '';
        } else {
            audio = new Audio();
            audio.volume = 1;
            audio.preload = 'auto';
            audio.addEventListener('ended', onSongEnded);
        }

        audio.src = song.url;
        audio.load();

        const onReady = () => {
            if (audio.readyState >= 2) {
                audio.currentTime = targetSec;
                if (isPlaying) audio.play().catch(e => console.warn(e));
                preloadNextSong(nextSongGlobalIndex);
                scheduleNextSwitch(remainingInSongMs);
                isSwitching = false;
            }
        };
        audio.addEventListener('canplay', onReady, { once: true });

        setTimeout(() => {
            if (audio.readyState < 2 && isPlaying) {
                audio.currentTime = targetSec;
                audio.play().catch(() => {});
                preloadNextSong(nextSongGlobalIndex);
                scheduleNextSwitch(remainingInSongMs);
                isSwitching = false;
            }
        }, 1500);
    }

    function scheduleNextSwitch(remainingMs) {
        if (switchTimeout) clearTimeout(switchTimeout);
        if (!isPlaying) return;

        const switchTime = Math.max(remainingMs - 1500, 100);

        switchTimeout = setTimeout(() => {
            loadNextSongFromGlobal();
        }, switchTime);

        setTimeout(() => {
            if (isPlaying && audio && !audio.paused) {
                loadNextSongFromGlobal();
            }
        }, remainingMs + 800);
    }

    function onSongEnded() {
        if (!isPlaying) return;
        if (switchTimeout) clearTimeout(switchTimeout);
        loadNextSongFromGlobal();
    }

    function togglePlayPause() {
        if (isLoading) return;

        if (isPlaying) {
            isPlaying = false;
            if (switchTimeout) clearTimeout(switchTimeout);
            if (audio) audio.pause();
            updateButtonUI();
        } else {
            isPlaying = true;
            isLoading = true;
            playPauseBtn.classList.add('loading');
            playPauseBtn.innerHTML = '<span>⏳</span> LOADING';
            loadAndPlayCurrentSong();
        }
    }

    function updateButtonUI() {
        if (isLoading) return;
        if (isPlaying) {
            playPauseBtn.innerHTML = '<span>⏹️</span> STOP';
            playPauseBtn.style.background = "rgba(200, 70, 70, 0.25)";
        } else {
            playPauseBtn.innerHTML = '<span>▶</span> PLAY';
            playPauseBtn.style.background = "rgba(30, 40, 65, 0.6)";
        }
        playPauseBtn.classList.remove('loading');
    }

    function loadAndPlayCurrentSong() {
        if (isSwitching) return;
        isLoading = true;

        const { songGlobalIndex, offsetInSongMs, remainingInSongMs, nextSongGlobalIndex } = getCurrentSong();
        const song = songList[songGlobalIndex];
        updateUI(songGlobalIndex, nextSongGlobalIndex);

        const targetSec = offsetInSongMs / 1000;

        if (audio && audio.src === song.url && !audio.ended) {
            audio.currentTime = targetSec;
            audio.play().catch(() => {});
            preloadNextSong(nextSongGlobalIndex);
            scheduleNextSwitch(remainingInSongMs);
            isLoading = false;
            updateButtonUI();
            return;
        }

        if (audio) {
            audio.pause();
            audio.src = '';
        } else {
            audio = new Audio();
            audio.volume = 1;
            audio.preload = 'auto';
            audio.addEventListener('ended', onSongEnded);
        }

        audio.src = song.url;
        audio.load();

        const onReady = () => {
            if (audio.readyState >= 2) {
                audio.currentTime = targetSec;
                audio.play().then(() => {
                    isLoading = false;
                    updateButtonUI();
                    preloadNextSong(nextSongGlobalIndex);
                    scheduleNextSwitch(remainingInSongMs);
                }).catch(() => {
                    isLoading = false;
                    updateButtonUI();
                });
            }
        };

        audio.addEventListener('canplay', onReady, { once: true });

        setTimeout(() => {
            if (audio.readyState < 2) {
                audio.currentTime = targetSec;
                audio.play().then(() => {
                    isLoading = false;
                    updateButtonUI();
                    preloadNextSong(nextSongGlobalIndex);
                    scheduleNextSwitch(remainingInSongMs);
                }).catch(() => {
                    isLoading = false;
                    updateButtonUI();
                });
            }
        }, 1500);
    }

    // Initialise
    playPauseBtn.addEventListener('click', togglePlayPause);
    loadAndPlayCurrentSong();
    updateButtonUI();

    setTimeout(() => {
        playPauseBtn.classList.add('visible');
    }, 1000);

    document.addEventListener('visibilitychange', () => {
        if (!document.hidden && isPlaying) {
            if (switchTimeout) clearTimeout(switchTimeout);
            loadAndPlayCurrentSong();
        }
    });
</script>
</body>
</html>
